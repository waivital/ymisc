# =====================================
# ===        GENERAL SETTINGS       ===
# =====================================

# Use vim keybindings in copy mode (Ctrl+b + [)
setw -g mode-keys vi

# Enable mouse mode (clickable tabs, resizable panes)
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1

set -g history-limit 50000

setw -g automatic-rename on
set -g set-titles on

setw -g monitor-activity off
set -g visual-activity off
setw -g monitor-bell off
set -g visual-bell off
set -g bell-action none

# Fix terminal colors
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

set -sg escape-time 0


# =====================================
# ===          KEY BINDINGS        ===
# =====================================

# Keep Ctrl+b as prefix
set -g prefix C-b

# Split panes using Vim split naming (v = vertical, s = horizontal)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane selection (Ctrl+b + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing (Ctrl+b + Ctrl+h/j/k/l)
# Press repeatedly to resize by 5 cells
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Easy config reload
bind r source-file ~/.tmux.conf \; display "Config reloaded!"


# =====================================
# ===    THEME & DESIGN (Nordic-ish)===
# =====================================

# Status bar design
set -g status-justify left
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-interval 2

# Left side of status bar (Session name)
set -g status-left '#[bg=#89b4fa,fg=#11111b,bold] #S #[bg=default,fg=default] '
set -g status-left-length 20

# Right side of status bar (Date and Time)
set -g status-right '#[bg=#313244,fg=#cdd6f4] %Y-%m-%d │ %H:%M '
set -g status-right-length 50

# Current active window tab
setw -g window-status-current-format '#[bg=#a6e3a1,fg=#11111b,bold] #I:#W '

# Inactive window tabs
setw -g window-status-format '#[bg=#313244,fg=#a6adc8] #I:#W '

# Pane borders
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#89b4fa'

# Messaging text
set -g message-style 'bg=#313244 fg=#f5e0dc bold'
